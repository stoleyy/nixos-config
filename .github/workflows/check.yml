name: check
on:
  push:
  pull_request:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

# Tight default for GITHUB_TOKEN — this workflow only reads the tree to lint /
# check / scan it. No issues, no comments, no pushes. Any future job needing
# more scope can opt-in via its own `permissions:` block.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # v5 runs on Node 24 — required ahead of the 2026-06 v4/Node20 deprecation.
      - uses: actions/checkout@v5
        with:
          # Don't persist GITHUB_TOKEN into the runner's .git/config — nothing
          # in this workflow pushes, and keeping it out limits exposure if a
          # later step is ever compromised.
          persist-credentials: false
      # Tag-pinned (was `@main`, which is a moving branch and a supply-chain
      # risk). Bump deliberately; consider moving to SHA pins for stricter
      # provenance.
      - uses: DeterminateSystems/nix-installer-action@v22
      # Non-blocking: DeterminateSystems put the cache behind FlakeHub auth
      # in 2026, so unauthenticated runs from forks/PRs fail this step. CI
      # still functions without cache — just ~2-3 min slower per run.
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        continue-on-error: true

      - name: flake check
        run: nix flake check --no-build

      - name: secrets scan
        run: nix run nixpkgs#gitleaks -- detect --no-banner --no-git

      - name: shell scripts
        run: nix run nixpkgs#shellcheck -- .claude/hooks/*.sh scripts/*.sh

      - name: lint (statix — warnings only)
        run: nix run nixpkgs#statix -- check . || true

      - name: lint (deadnix — blocking)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: format (nixfmt)
        run: |
          find . -name '*.nix' -not -path './result*' -not -path './.git/*' -print0 \
            | xargs -0 nix run nixpkgs#nixfmt -- --check
