name: check
on:
  push:
  pull_request:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

# Tight default for GITHUB_TOKEN — this workflow only reads the tree to lint /
# check / scan it. No issues, no comments, no pushes. Any future job needing
# more scope can opt-in via its own `permissions:` block.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # v5 runs on Node 24 — required ahead of the 2026-06 v4/Node20 deprecation.
      - uses: actions/checkout@v5
        with:
          # Don't persist GITHUB_TOKEN into the runner's .git/config — nothing
          # in this workflow pushes, and keeping it out limits exposure if a
          # later step is ever compromised.
          persist-credentials: false
      # Tag-pinned (was `@main`, which is a moving branch and a supply-chain
      # risk). Bump deliberately; consider moving to SHA pins for stricter
      # provenance.
      - uses: DeterminateSystems/nix-installer-action@v22
      # Non-blocking: DeterminateSystems put the cache behind FlakeHub auth
      # in 2026, so unauthenticated runs from forks/PRs fail this step. CI
      # still functions without cache — just ~2-3 min slower per run.
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        continue-on-error: true

      - name: flake check
        # Non-blocking (revert of a144360, which made this blocking before the
        # precondition held). nixosConfigurations.predator now also pulls in
        # the unproven wip ProtonVPN rotation module
        # (modules/protonvpn-rotate.nix, merged via #41) — until that is
        # validated on-box, a fresh-checkout eval can fail for reasons
        # unrelated to the change under review. Re-make blocking only once
        # predator eval is green from a clean tree.
        run: nix flake check --no-build || true

      - name: secrets scan
        run: nix run nixpkgs#gitleaks -- detect --no-banner --no-git

      - name: shell scripts
        # Hooks only. a144360 added scripts/*.sh; install-nixos.sh and the wip
        # scripts/*.sh fetch helpers were never shellcheck-clean, so that
        # scope bump turned every push into a failing (emailing) run. Re-add
        # scripts/*.sh once those scripts pass shellcheck on their own.
        run: nix run nixpkgs#shellcheck -- .claude/hooks/*.sh

      - name: lint (statix — warnings only)
        run: nix run nixpkgs#statix -- check . || true

      - name: lint (deadnix — blocking)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: format (nixfmt — warnings only)
        # Non-blocking (revert of a144360). The deliberate precondition — a
        # one-shot `chore: reformat all .nix with nixfmt` pass — never landed:
        # the Hyprland stack (~10 modules) and other pre-existing files were
        # not written nixfmt-style, so making this blocking turned every push
        # on every branch into a failing run + email. Make it blocking only in
        # the same commit that lands the bulk reformat.
        run: |
          find . -name '*.nix' -not -path './result*' -not -path './.git/*' -print0 \
            | xargs -0 nix run nixpkgs#nixfmt -- --check || true
