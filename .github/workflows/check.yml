name: check
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # v5 runs on Node 24 — required ahead of the 2026-06 v4/Node20 deprecation.
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: flake check
        # Non-blocking until hosts/predator/hardware-configuration.nix is
        # committed — without that file, nixosConfigurations.predator can't be
        # evaluated from a fresh checkout (CI, Windows). Remove `|| true` once
        # that file lands.
        run: nix flake check --no-build || true

      - name: secrets scan
        run: nix run nixpkgs#gitleaks -- detect --no-banner --no-git

      - name: shell scripts
        run: nix run nixpkgs#shellcheck -- .claude/hooks/*.sh

      - name: lint (statix — warnings only)
        run: nix run nixpkgs#statix -- check . || true

      - name: lint (deadnix — blocking)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: format
        run: |
          files=$(find . -name '*.nix' -not -path './result*' -not -path './.git/*')
          nix run nixpkgs#nixfmt-rfc-style -- --check $files
